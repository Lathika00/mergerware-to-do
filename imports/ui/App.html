<body>
  {{> mainContainer}}
</body>

<template name="mainContainer">
  <div class="app">
    {{#if isUserLogged}}
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="brand-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/>
              <path d="M2 17l10 5 10-5"/>
              <path d="M2 12l10 5 10-5"/>
            </svg>
          </div>
          <span class="brand-name">Taskflow</span>
        </div>

        <nav class="sidebar-nav">
          <div class="nav-section-label">Categories</div>
          <button class="nav-item {{#if isSelectedCategory 'all'}}active{{/if}}" data-category="all" id="filter-all">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
            </svg>
            <span>All Tasks</span>
            <span class="nav-count">{{totalCount}}</span>
          </button>
          <button class="nav-item nav-work {{#if isSelectedCategory 'Work'}}active{{/if}}" data-category="Work" id="filter-work">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
            </svg>
            <span>Work</span>
            <span class="nav-count">{{categoryCount 'Work'}}</span>
          </button>
          <button class="nav-item nav-personal {{#if isSelectedCategory 'Personal'}}active{{/if}}" data-category="Personal" id="filter-personal">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
            <span>Personal</span>
            <span class="nav-count">{{categoryCount 'Personal'}}</span>
          </button>
          <button class="nav-item nav-urgent {{#if isSelectedCategory 'Urgent'}}active{{/if}}" data-category="Urgent" id="filter-urgent">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
            </svg>
            <span>Urgent</span>
            <span class="nav-count">{{categoryCount 'Urgent'}}</span>
          </button>
        </nav>

        <div class="sidebar-footer">
          <div class="user-info">
            <div class="user-avatar">{{userInitial}}</div>
            <span class="user-name">{{getUser.username}}</span>
          </div>
          <button class="btn-theme-toggle" id="theme-toggle-button" title="Toggle theme">
            {{#if isDarkTheme}}
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
              </svg>
            {{else}}
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
              </svg>
            {{/if}}
          </button>
          <button class="btn-logout" id="logout-button" title="Sign out">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
      </aside>

      <main class="content">
        <div class="content-header">
          <div class="header-left">
            <h1 class="page-title">{{currentCategoryTitle}}</h1>
            <span class="task-summary">{{incompleteCount}} remaining</span>
          </div>
          <div class="header-actions">
            <div class="progress-ring-container" id="progress-stats">
              <svg class="progress-ring" viewBox="0 0 36 36">
                <circle class="progress-ring__bg" cx="18" cy="18" r="14"/>
                <circle class="progress-ring__fg" cx="18" cy="18" r="14"
                  stroke-dasharray="{{progressCircumference}}"
                  stroke-dashoffset="{{progressOffset}}"/>
              </svg>
              <div class="progress-info">
                <span class="progress-percent">{{progressPercent}}%</span>
                <span class="progress-label">done</span>
              </div>
            </div>
            <button class="btn-toggle {{#if hideCompleted}}active{{/if}}" id="hide-completed-button">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                {{#if hideCompleted}}
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                {{else}}
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>
                {{/if}}
              </svg>
              {{#if hideCompleted}}Show completed{{else}}Hide completed{{/if}}
            </button>
          </div>
        </div>

        <div class="search-container">
          <div class="search-input-group">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" class="search-input" placeholder="Search tasks..." id="search-input" autocomplete="off" />
            <button class="search-clear {{#if hasSearchQuery}}visible{{/if}}" id="search-clear-button" type="button">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
        </div>

        <form class="task-form" id="task-form">
          <div class="form-input-group">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            <input
              type="text"
              name="text"
              placeholder="Add a new task..."
              autocomplete="off"
              id="task-input"
            />
          </div>
          <select name="category" id="category-select">
            <option value="Work">Work</option>
            <option value="Personal">Personal</option>
            <option value="Urgent">Urgent</option>
          </select>
          <button type="submit" class="btn-add" id="add-task-button">Add Task</button>
        </form>

        <div class="task-list-container">
          {{#if tasks.count}}
            <ul class="tasks" id="task-list">
              {{#each tasks}}
                {{> task}}
              {{/each}}
            </ul>
          {{else}}
            <div class="empty-state">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                <polyline points="22 4 12 14.01 9 11.01"/>
              </svg>
              <h3>No tasks here</h3>
              <p>Create a task above to get started</p>
            </div>
          {{/if}}
        </div>
      </main>
    {{else}}
      {{> login}}
    {{/if}}
  </div>

  <!-- Toast Notifications -->
  <div class="toast-container" id="toast-container">
    {{#each toasts}}
      <div class="toast toast-{{type}} {{#if removing}}removing{{/if}}" data-toast-id="{{id}}">
        {{#if isSuccess}}
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        {{/if}}
        {{#if isError}}
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
          </svg>
        {{/if}}
        {{#if isInfo}}
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
          </svg>
        {{/if}}
        <span class="toast-text">{{message}}</span>
      </div>
    {{/each}}
  </div>
</template>
