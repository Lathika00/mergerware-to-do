<template name="task">
  <li class="task {{#if isChecked}}checked{{/if}}" data-id="{{_id}}">
    <div class="drag-handle" title="Drag to reorder">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
        <circle cx="8" cy="4" r="2"/><circle cx="16" cy="4" r="2"/>
        <circle cx="8" cy="12" r="2"/><circle cx="16" cy="12" r="2"/>
        <circle cx="8" cy="20" r="2"/><circle cx="16" cy="20" r="2"/>
      </svg>
    </div>
    <div class="checkbox-wrapper">
      <span class="custom-checkbox {{#if isChecked}}is-checked{{/if}}">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </span>
    </div>
    <span class="task-text">{{text}}</span>
    <span class="category-tag tag-{{categoryClass}}">{{category}}</span>
    <button class="delete-btn" id="delete-{{_id}}" title="Delete task">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
      </svg>
    </button>
  </li>
</template>
